<h2>Editar Cliente</h2>

<form method="POST">
    Nome: <input type="text" name="nome" value="{{ cliente[1] }}"><br><br>
    Email: <input type="email" name="email" value="{{ cliente[2] }}"><br><br>
    Telefone: <input type="number" name="telefone" value="{{ cliente[3] }}"><br><br>

    <button type="submit">Atualizar</button>
</form>
